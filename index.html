<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>インターネット民俗STG</title>
<link rel="stylesheet" href="css/style.css">
<!-- PWA: マニフェスト本体のタイトルは"IT STG"(manifest.json / apple-mobile-web-app-title) -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0714">
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16.png">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IT STG">
<!-- OGP / Twitter Card: SNS等でリンクを共有した時のプレビュー用(assets/ogp.pngはtools/build_ogp.pyで生成) -->
<meta property="og:title" content="インターネット民俗STG">
<meta property="og:description" content="東方Projectライクな縦スクロール弾幕STG。ブラウザだけで遊べます。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://yamyamtamtam.github.io/stg/">
<meta property="og:image" content="https://yamyamtamtam.github.io/stg/assets/ogp.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale" content="ja_JP">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="インターネット民俗STG">
<meta name="twitter:description" content="東方Projectライクな縦スクロール弾幕STG。ブラウザだけで遊べます。">
<meta name="twitter:image" content="https://yamyamtamtam.github.io/stg/assets/ogp.png">
</head>
<body>
<div id="wrap">
  <canvas id="game" width="480" height="640"></canvas>
  <div id="side">
    <h1>インターネット民俗STG</h1>
    <div class="stat"><span class="label">SCORE</span><span class="value gold" id="uiScore">0</span></div>
    <div class="stat"><span class="label">HI-SCORE</span><span class="value" id="uiHi">0</span></div>
    <div class="stat"><span class="label">PLAYER</span><span class="stars" id="uiLives">★★★</span></div>
    <div class="stat"><span class="label">SPELL</span><span class="stars bomb" id="uiBombs">✦✦✦</span></div>
    <div class="stat">
      <span class="label">POWER</span><span class="value" id="uiPower">0.00 / 4.00</span>
      <div id="powbar"><div id="powfill"></div></div>
    </div>
    <div class="stat"><span class="label">GRAZE</span><span class="value" id="uiGraze">0</span></div>
    <div id="keys">
      <b>矢印</b>移動<br>
      <b>Z</b>ショット<br>
      <b>X</b>陽符(ボム)<br>
      <b>Shift</b>低速移動<br>
      <b>Esc</b>ポーズ
    </div>
  </div>
</div>
<!-- 読み込み順が重要: 生成アセット → エンジン → 各シナリオ → 起動。
     新シナリオを追加したら js/scenarios/ にファイルを作り、ここに1行足す(main.jsより前) -->
<script src="js/gen/sprites.js"></script>
<script src="js/gen/audio.js"></script>
<script src="js/engine.js"></script>
<script src="js/scenarios/scenario1_homogaki.js"></script>
<script src="js/scenarios/scenario2_otasa.js"></script>
<script src="js/scenarios/scenario3_salon.js"></script>
<script src="js/scenarios/scenario4_singularity.js"></script>
<script src="js/main.js"></script>
<script>
// PWA: オフラインキャッシュ用Service Worker登録(対応環境のみ、失敗しても無視)
if("serviceWorker" in navigator){
  addEventListener("load", ()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
</body>
</html>
